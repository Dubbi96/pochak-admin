server:
  port: 8084

spring:
  application:
    name: pochak-operation-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pochak?currentSchema=operation
    username: ${DB_USERNAME:pochak}
    password: ${DB_PASSWORD:pochak}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: operation
        format_sql: true
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pochak.operation: DEBUG
    org.hibernate.SQL: DEBUG
