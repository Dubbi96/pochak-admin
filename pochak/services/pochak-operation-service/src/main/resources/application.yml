server:
  port: 8084

spring:
  application:
    name: pochak-operation-service

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pochak}
    password: ${RABBITMQ_PASS:pochak_dev_2026}
  datasource:
    url: jdbc:postgresql://localhost:5432/pochak?currentSchema=operation
    username: ${DB_USERNAME:pochak}
    password: ${DB_PASSWORD:pochak}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  flyway:
    enabled: false  # Disabled for dev; enable for production
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
    schemas:
      - operation
    default-schema: operation
  jpa:
    hibernate:
      ddl-auto: update  # Revert from validate to update for dev
    properties:
      hibernate:
        default_schema: operation
        format_sql: true
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

pochak:
  streaming:
    provider: mock  # Replace with 'pixellot' or 'aws-ivs' for production
    ingest: stub    # Replace with real ingest service for production
    cdn-base-url: ${CDN_BASE_URL:https://cdn.pochak.co.kr}
    rtmp-base-url: ${RTMP_BASE_URL:rtmp://ingest.pochak.co.kr/live}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.pochak.operation: DEBUG
    org.hibernate.SQL: DEBUG
