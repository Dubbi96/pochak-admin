server:
  port: 9090

spring:
  application:
    name: pochak-bo-bff

pochak:
  services:
    identity-url: ${SERVICES_IDENTITY_URL:http://localhost:8081}
    content-url: ${SERVICES_CONTENT_URL:http://localhost:8082}
    commerce-url: ${SERVICES_COMMERCE_URL:http://localhost:8083}
    operation-url: ${SERVICES_OPERATION_URL:http://localhost:8084}
    admin-url: ${SERVICES_ADMIN_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.pochak.bo.bff: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
