server:
  port: 8082

spring:
  application:
    name: pochak-content-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pochak}?currentSchema=content
    username: ${DB_USERNAME:pochak}
    password: ${DB_PASSWORD:pochak}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
    schemas:
      - content
    default-schema: content
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pochak}
    password: ${RABBITMQ_PASS:pochak_dev_2026}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: content
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

pochak:
  streaming:
    provider: mock  # Replace with 'pixellot' or 'aws-ivs' for production
    cdn-base-url: ${CDN_BASE_URL:https://cdn.pochak.co.kr}
    rtmp-base-url: ${RTMP_BASE_URL:rtmp://ingest.pochak.co.kr/live}
  services:
    commerce:
      base-url: ${COMMERCE_SERVICE_URL:http://localhost:8083}
      connect-timeout: 2000
      read-timeout: 3000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

resilience4j:
  circuitbreaker:
    instances:
      commerceEntitlement:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80

logging:
  level:
    com.pochak.content: DEBUG
    org.hibernate.SQL: DEBUG
