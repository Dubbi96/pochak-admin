server:
  port: 8081

spring:
  application:
    name: pochak-identity-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pochak}?currentSchema=identity
    username: ${DB_USERNAME:pochak}
    password: ${DB_PASSWORD:pochak}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: identity
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

pochak:
  jwt:
    secret: ${JWT_SECRET:pochak-jwt-secret-key-for-development-only-minimum-256-bits-long-enough}
    access-expiration: 1800000       # 30 min
    refresh-expiration: 2592000000   # 30 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

oauth2:
  kakao:
    rest-api-key: <REDACTED_KAKAO_REST_KEY>
    redirect-uri: http://localhost:8080/api/v1/auth/oauth2/callback/kakao
  google:
    client-id: 314211860010-jm6g2g7vqan6corsa29rb7fh35gfdvto.apps.googleusercontent.com
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: http://localhost:8080/api/v1/auth/oauth2/callback/google
  naver:
    client-id: ${NAVER_CLIENT_ID:<REDACTED_NAVER_CLIENT_ID>}
    client-secret: ${NAVER_CLIENT_SECRET:a3YSt8mPKy}
    redirect-uri: http://localhost:8080/api/v1/auth/oauth2/callback/naver

app:
  web-base-url: ${WEB_BASE_URL:http://localhost:3100}

logging:
  level:
    com.pochak.identity: DEBUG
    org.hibernate.SQL: DEBUG
