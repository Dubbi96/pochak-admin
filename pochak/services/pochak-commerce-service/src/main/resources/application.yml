server:
  port: 8083

spring:
  application:
    name: pochak-commerce-service

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pochak}
    password: ${RABBITMQ_PASS:pochak_dev_2026}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pochak}?currentSchema=commerce
    username: ${DB_USERNAME:pochak}
    password: ${DB_PASSWORD:pochak}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
    schemas:
      - commerce
    default-schema: commerce
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: commerce
        format_sql: true
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

pochak:
  payment:
    provider: stub  # Replace with 'kcp', 'google', 'apple' for production

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.pochak.commerce: DEBUG
    org.hibernate.SQL: DEBUG
